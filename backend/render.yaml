services:
  - type: web
    name: hed-retrieval-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: false # Start as false until env vars are ready
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # All sensitive vars should be configured in the Render Dashboard,
      # but they are listed here as placeholders so Render registers them.
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
